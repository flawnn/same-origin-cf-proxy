name = "same-origin-cf-proxy"
main = "src/index.js"
compatibility_date = "2024-09-02"

[vars]
# Map of proxy targets: name → { origin, allow }.
#   origin = upstream the named prefix proxies to (/proxy/<name>/* → origin/*)
#   allow  = regex of extra hostnames proxiable via /proxy/h/<host>/* (e.g. API subdomains)
PROXY_TARGETS = '{"example":{"origin":"https://example.com","allow":"(^|\\.)example\\.com$"}}'
